services:
  - type: web
    name: kapiroll-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    rootDir: backend
    envVars:
      - key: DATA_SOURCE
        value: bigquery
      - key: GOOGLE_SHEET_ID
        value: 1pyzugIeZBDCMq0kTCyWBis9toyzTXWmubGjLhng9vhk
      - key: GOOGLE_SHEET_SOURCE_MODE
        value: api
      - key: GOOGLE_SHEET_GID
        value: "0"
      - key: BQ_PROJECT_ID
        sync: false
      - key: BQ_DATASET
        sync: false
      - key: BQ_TABLE
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: APPS_SCRIPT_CHAT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: static
    name: tablero-nomina-web
    rootDir: frontend
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
