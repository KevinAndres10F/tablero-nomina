services:
  - type: web
    name: kapiroll-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATA_SOURCE
        value: sheets
      - key: GOOGLE_SHEET_ID
        value: 1pyzugIeZBDCMq0kTCyWBis9toyzTXWmubGjLhng9vhk
      - key: GOOGLE_SHEET_SOURCE_MODE
        value: auto
      - key: GOOGLE_SHEET_GID
        value: "0"
      - key: BQ_PROJECT_ID
        sync: false
      - key: BQ_DATASET
        sync: false
      - key: BQ_TABLE
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
