[build]
  publish = "frontend"
  command = "npm install && cd frontend && npm install && npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/.netlify/functions/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-proxy/:splat"
  status = 200
  force = true
